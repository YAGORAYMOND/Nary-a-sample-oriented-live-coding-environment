<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nary: a sample-oriented live coding environment</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: monospace; }
        #drop-zone { height: 60px; border: 2px dashed #4CAF50; margin: 10px; display: flex; align-items: center; justify-content: center; background: #252525; border-radius: 8px; }
        .CodeMirror { height: 400px; font-size: 18px; border-bottom: 1px solid #444; }
        #controls { padding: 15px; background: #333; display: flex; gap: 10px; }
        button { cursor: pointer; padding: 10px 20px; background: #4CAF50; border: none; color: white; border-radius: 4px; font-weight: bold; }
        #log { padding: 10px; color: #4CAF50; font-size: 12px; }
    </style>
</head>
<body>

<div id="drop-zone">DROP .WAV HERE</div>
<div id="log">Waiting for file...</div>

<textarea id="code-editor">
atmosfera > source ah_E3
  rate 2
  pitch 12
  grain 500 //ms
  reverb 0.1
  activity 0.4 //probabilitat de sonar (0-1)
  shimmer 0.2 //afegeix harmonics i detune (0-1)
  scatter 1  //rebota els grans 

ritme > source fatbass_1
  rate 2
  pitch -12
  grain 500
  reverb 0.1
  shimmer 0
  
</textarea>

<div id="controls">
    <button onclick="execute()">EXECUTE (Ctrl+Enter)</button>
    <button onclick="stop()" style="background:#f44336;">STOP (Ctrl+.)</button>
</div>

<script>
// 1. VARIABLES GLOBALS
    window.samples = {}; 
    const logElement = document.getElementById('log');
    let runningLoops = []; 

    // CREEM LA REVERB GLOBAL (Una sola vegada)
    const globalReverb = new Tone.Reverb({
        decay: 4,       // Segons de cua
        wet: 0.5        // Quantitat de barreja (50%)
    }).toDestination();
    globalReverb.generate(); // Prepara l'efecte

    // 2. EL MOTOR (Nary Engine)
    const nary = {
        createFlux: (id, params) => {
            const sourceName = params.source ? params.source.trim() : 'sine';
            if (!window.samples[sourceName]) return;

            Tone.getDestination().volume.value = 0; 
            Tone.Transport.start(); 

            const interval = params.rate ? (1 / parseFloat(params.rate)) : 0.5;
            const shimmer = params.shimmer ? parseFloat(params.shimmer) : 0;
            
            // Paràmetre SCATTER: controla la dispersió temporal dels mosaics
            const scatter = params.scatter ? parseFloat(params.scatter) : 0;
            const harmonics = [1, 2, 1.5, 0.75, 4]; 

            const loop = new Tone.Loop(time => {
                const activity = params.activity ? parseFloat(params.activity) : 1;
                if (Math.random() > activity) return;

                const revValue = params.reverb ? parseFloat(params.reverb) : 0.5;
                
                harmonics.forEach((h, i) => {
                    // La probabilitat de veus extra depèn del shimmer i el scatter
                    if (i > 0 && Math.random() > (shimmer + scatter) / 2) return;

                    // L'essència del SCATTER: un desplaçament en el temps que no afecta la nota base (i=0)
                    const delay = i === 0 ? 0 : Math.random() * (scatter * 0.3);
                    const grainTime = time + delay;

                    const fFreq = i === 0 ? 8000 : (1 - revValue) * 4000 + 200;
                    const filter = new Tone.Filter(fFreq, "lowpass").connect(globalReverb);

                    const envelope = new Tone.Gain(0).connect(filter);
                    const player = new Tone.Player({
                        url: window.samples[sourceName],
                        autostart: false,
                        onload: () => {
                            const p = parseFloat(params.pitch) || 0;
                            const detune = (Math.random() * 0.1 - 0.05) * shimmer;
                            player.playbackRate = (Math.pow(2, p / 12) * h) + detune;
                            
                            let g = params.grain ? parseFloat(params.grain) : 500;
                            // La nota base es fa més llarga amb més scatter per donar context
                            if (i === 0 && scatter > 0) g *= (1 + scatter); 
                            if (i > 0) g *= (0.4 + Math.random() * 0.4); 
                            
                            const duration = g / 1000;
                            const panner = new Tone.Panner(Math.random() * 2 - 1).connect(envelope);
                            player.connect(panner);

                            const vol = i === 0 ? 1.3 : (0.7 / i) * (shimmer + scatter);
                            
                            envelope.gain.setValueAtTime(0, grainTime);
                            envelope.gain.linearRampToValueAtTime(vol, grainTime + 0.03);
                            envelope.gain.setValueAtTime(vol, grainTime + duration - 0.03);
                            envelope.gain.linearRampToValueAtTime(0, grainTime + duration);

                            player.start(grainTime);
                            player.stop(grainTime + duration);

                            setTimeout(() => {
                                player.dispose(); panner.dispose(); envelope.dispose(); filter.dispose();
                            }, (duration + 2) * 1000);
                        }
                    });
                });

            }, interval).start(0);
            
            runningLoops.push(loop);
        }
    };

    // 3. EDITOR
    const editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
        lineNumbers: true, 
        mode: "javascript", 
        theme: "monokai"
    });

    // 4. DRAG & DROP MULTI-SAMPLE
    const dropZone = document.getElementById('drop-zone');
    dropZone.ondragover = e => e.preventDefault();
    dropZone.ondrop = e => {
        e.preventDefault();
        const files = Array.from(e.dataTransfer.files);
        files.forEach(file => {
            if (file.type.includes('audio')) {
                const name = file.name.split('.')[0]; // Nom sense .wav
                window.samples[name] = URL.createObjectURL(file);
                console.log("Carregat:", name);
            }
        });
        logElement.innerText = "Samples: " + Object.keys(window.samples).join(", ");
    };

    // 5. EXECUCIÓ (Amb el reset de volum corregit)
    async function execute() {
        console.log("Comandament EXECUTE rebut"); // Mira la consola (F12) per confirmar
        logElement.innerText = "EXECUTING...";
        
        await Tone.start();
        
        // Aturem tot el que sonava abans
        stop(); 
        
        // REESTABLIM EL VOLUM MESTRE IMMEDIATAMENT
        Tone.getDestination().volume.value = 0;
        
        const code = editor.getValue();
        const lines = code.split('\n');
        
        let currentId = null;
        let params = {};

        lines.forEach(line => {
            const trimmed = line.trim();
            if (!trimmed || trimmed.startsWith('//')) return;

            if (line.includes('>')) {
                if (currentId) nary.createFlux(currentId, params);
                const parts = line.split('>');
                currentId = parts[0].trim();
                params = {}; 
                const inline = parts[1].trim().split(/\s+/);
                for (let i = 0; i < inline.length; i += 2) {
                    if (inline[i] && inline[i+1]) params[inline[i]] = inline[i+1];
                }
            } 
            else if (currentId && (line.startsWith(' ') || line.startsWith('\t'))) {
                const p = trimmed.split(/\s+/);
                if (p[0] && p[1]) params[p[0]] = p[1];
            }
        });

        if (currentId) nary.createFlux(currentId, params);
        
        // Avisem a l'usuari que estem LIVE
        logElement.innerText = "RUNNING: " + Object.keys(window.samples).join(", ");
    }

    // 6. STOP (Més net)
    function stop() {
        // Parem el rellotge
        Tone.Transport.stop();
        Tone.Transport.cancel(0);
        
        // Netegem tots els bucles i sons pendents
        runningLoops.forEach(node => {
            if (node && node.dispose) node.dispose();
        });
        runningLoops = [];
        
        // Baixem el volum
        Tone.getDestination().volume.value = -Infinity;
        logElement.innerText = "STOPPED";
    }

    // --- 7. CONFIGURACIÓ DE SHORTCUTS (Accions específiques) ---
    // Això fa que l'editor entengui Ctrl+Enter i Ctrl+.
    editor.setOption("extraKeys", {
        "Ctrl-Enter": () => { execute(); },
        "Cmd-Enter": () => { execute(); },
        "Ctrl-.": () => { stop(); }
    });

    // Per si fas clic fora de l'editor, que els shortcuts funcionin igual
    document.addEventListener('keydown', e => {
        if (e.ctrlKey && e.key === 'Enter') {
            e.preventDefault();
            execute();
        }
        if (e.ctrlKey && e.key === '.') {
            e.preventDefault();
            stop();
        }
    });

</script>
</body>
</html>
