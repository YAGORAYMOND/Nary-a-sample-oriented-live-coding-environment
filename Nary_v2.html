<script>
/* ===========================================================
  N-ARY ENGINE: TO-DO LIST (ROADMAP DE DESENVOLUPAMENT)
  ===========================================================

  [ ] 1. AUDIO ENGINE: FIDELITAT I FÍSICA
      [ ] Implementar PINK NOISE: El 'source noise' actual és blanc. 
          Necessitem un filtre de 1/f per a textures orgàniques.
      [ ] LFO MODULATION ENGINE: Fer que 'cycle' i 'drift' realment 
          modifiquin els paràmetres en temps real (AudioParam automation).
      [ ] TRUE JITTER: Afegir el paràmetre 'jitter' per desplaçar el start-time 
          de cada gra aleatòriament (actualment el rate és massa rítmic).
      [ ] FEEDBACK DELAY NETWORK: Millorar el 'space' perquè no sigui només 
          convolució, sinó una cua que es retroalimenta infinitament.

  [ ] 2. TONALITAT: MICROTONALITAT NATIVA
      [ ] TUNING TABLES: Crear un diccionari amb sistemes reals 
          (31-TET, 19-TET, Pythagorean, Just Intonation).
      [ ] SCALE LOCKING: Implementar la funció 'scale' per forçar que 
          els 'step' i 'pitch' caiguin sempre en ràtios harmòniques.
      [ ] POLYPHONIC FLUX: Permetre que un sol flux 'N-ary' generi 
          acords complexos si es defineixen múltiples ràtios al pitch.

  [ ] 3. INTERFÍCIE (UI/UX)
      [ ] SYNTAX HIGHLIGHTING: Afegir colors al textarea perquè es 
          distingeixin 'source', 'pitch', i els valors numèrics.
      [ ] FILE DROP SOURCE: Permetre arrossegar un .wav/.mp3 per usar-lo 
          com a buffer en lloc de només oscil·ladors (Essencial Microcosm).
      [ ] HOLOGRAPHIC VISUALIZER: Que el canvas reaccioni realment a la 
          freqüència i densitat de cada flux de forma independent.

  [ ] 4. OPTIMITZACIÓ (ELIMINACIÓ DEFINITIVA DE CLICKS)
      [ ] AUDIO WORKLET: Moure tot el càlcul de grans a un fil separat (Worker). 
          setInterval() és poc precís i és el culpable dels micro-clicks rítmics.
      [ ] ZERO-CROSSING DETECTION: Que el gra només s'inicii quan l'ona 
          està a zero per evitar transitoris agressius.

  [ ] 5. SISTEMA N-ary (LÒGICA PROPIA)
      [ ] INTERFERÈNCIA: Que un flux pugui modular-ne un altre 
          (Ex: 'space' de Flux A controlat per l'activitat de Flux B).
      [ ] MACRO/MICRO FOCUS: Refinar la transició entre els dos modes 
          com una interpolació suau d'envolupants.
  ===========================================================
*/
</script>


<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>N-ary | Texture Engine</title>
    <style>
        body { background: #020202; color: #00ff88; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #editor { flex: 1; background: transparent; color: #00ff88; border: none; padding: 25px; font-size: 16px; outline: none; resize: none; line-height: 1.6; }
        #viz { height: 20%; background: #000; border-top: 1px solid #111; }
        .bar { background: #000; padding: 15px; display: flex; justify-content: space-between; border-bottom: 1px solid #111; }
        button { background: #00ff88; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>

<body>

<div class="bar">
    <button onclick="initNary()">RENDER TEXTURE (Ctrl+Enter)</button>
    <div style="font-size: 12px; opacity: 0.5;">N-ARY // HARMONIC DENSITY MODE</div>
</div>

<textarea id="editor" spellcheck="false">
// N-ARY: TEXTURA D'HARMÒNICS (ZERO CLICKS)
// Prova de canviar el pitch de 0 a 7 o 12

nuvol > source triangle
  rate 15
  density 80
  size 1200ms
  pitch 0
  fine_detune 8 drift 5s
  space 0.9
  focus micro

guspires > source sine
  rate 2
  activity 0.4
  pitch 24
  size 50ms
  space 0.2
  focus macro
</textarea>

<canvas id="viz"></canvas>

<script>
let audioCtx, masterGain, verb;
let runningFluxes = {};

async function initNary() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.3;

        // Reverb més densa per "lligar" els grans
        verb = audioCtx.createConvolver();
        const length = audioCtx.sampleRate * 4;
        const impulse = audioCtx.createBuffer(2, length, audioCtx.sampleRate);
        for (let i = 0; i < 2; i++) {
            const chan = impulse.getChannelData(i);
            for (let j = 0; j < length; j++) {
                chan[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / length, 3);
            }
        }
        verb.buffer = impulse;
        masterGain.connect(verb);
        verb.connect(audioCtx.destination);
        masterGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    updateEngine();
}

function updateEngine() {
    const lines = document.getElementById('editor').value.split('\n');
    let currentId = null;
    let newSettings = {};
    lines.forEach(line => {
        const trimmed = line.trim();
        if (!trimmed || trimmed.startsWith('//')) return;
        if (line.includes('>')) {
            currentId = line.split('>')[0].trim();
            newSettings[currentId] = { params: {} };
        } else if (currentId && line.startsWith('  ')) {
            const [attr, val] = trimmed.split(/\s+/);
            newSettings[currentId].params[attr] = val;
        }
    });
    Object.keys(newSettings).forEach(id => {
        if (!runningFluxes[id]) runningFluxes[id] = createFluxInstance(id, newSettings[id]);
        else runningFluxes[id].update(newSettings[id].params);
    });
}

function createFluxInstance(id, data) {
    let params = data.params;
    let intervalId = null;

    const tick = () => {
        const now = audioCtx.currentTime;
        const dur = params.size ? parseFloat(params.size) / 1000 : 0.5;
        
        // SÈRIE D'HARMÒNICS (Això crea la textura)
        const harmonics = [1, 2, 3, 1.5]; // Fonamental, Octava, Duodècima, Quinta
        
        harmonics.forEach((h, i) => {
            const osc = audioCtx.createOscillator();
            const env = audioCtx.createGain();
            const f = audioCtx.createBiquadFilter();

            f.type = "lowpass";
            f.frequency.value = (1 - (params.space || 0.5)) * 3000 + 100;

            osc.type = params.source || 'sine';
            const baseFreq = 110 * Math.pow(2, (parseFloat(params.pitch) || 0) / 12);
            osc.frequency.setValueAtTime(baseFreq * h, now);
            osc.detune.setValueAtTime((Math.random() - 0.5) * (parseFloat(params.fine_detune) || 0), now);

            // ENVOLUPANT ANTI-CLICK (S-Curve)
            env.gain.setValueAtTime(0, now);
            env.gain.linearRampToValueAtTime(0.1 / (i + 1), now + dur * 0.4);
            env.gain.exponentialRampToValueAtTime(0.0001, now + dur);

            osc.connect(f); f.connect(env); env.connect(masterGain);
            osc.start(now); osc.stop(now + dur);
        });
    };

    const start = () => {
        if (intervalId) clearInterval(intervalId);
        intervalId = setInterval(tick, 1000 / (parseFloat(params.rate) || 1));
    };
    start();
    return { 
    update: (p) => { params = p; },
    getParams: () => params 
    };
}

document.addEventListener('keydown', e => { if (e.ctrlKey && e.key === 'Enter') initNary(); });

// --- SISTEMA VISUAL N-ARY ---
const canvas = document.getElementById('viz');
const ctx = canvas.getContext('2d');

function draw() {
    // Ajustar tamany del canvas
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight * 0.25;
    const centerY = canvas.height / 2;
    const bufferHeight = canvas.height * 0.3;

    // Fons negre amb estela (per veure el moviment)
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Dibuixem cada flux actiu
    const fluxKeys = Object.keys(runningFluxes);
    
    fluxKeys.forEach((id, index) => {
        const flux = runningFluxes[id];
        const params = flux.getParams(); // Necessitem accedir als paràmetres actuals
        
        // 1. Dibuixar l'ona base (Buffer estàtic per ara)
        ctx.strokeStyle = index % 2 === 0 ? 'rgba(0, 255, 136, 0.15)' : 'rgba(0, 136, 255, 0.15)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let x = 0; x < canvas.width; x++) {
            // Generem una ona visualment complexa per simular un buffer real
            let drift = Math.sin(Date.now() * 0.001 + index);
            let y = centerY + Math.sin(x * 0.02 + drift) * Math.cos(x * 0.005) * bufferHeight;
            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();

        // 2. Dibuixar el "Punter de Lectura" i el Gra
        const grainSizeMs = parseFloat(params.size) || 100;
        const visualWidth = (grainSizeMs / 1000) * 300; // Amplada segons durada
        
        // Calculem una posició simulada que depèn del 'rate'
        let speed = (parseFloat(params.rate) || 1) * 0.001;
        let playhead = (Date.now() * speed * (index + 1)) % canvas.width;

        // Finestra del Gra (Holograma)
        const grad = ctx.createLinearGradient(playhead - visualWidth/2, 0, playhead + visualWidth/2, 0);
        grad.addColorStop(0, 'rgba(0, 255, 136, 0)');
        grad.addColorStop(0.5, index % 2 === 0 ? 'rgba(0, 255, 136, 0.4)' : 'rgba(0, 136, 255, 0.4)');
        grad.addColorStop(1, 'rgba(0, 255, 136, 0)');
        
        ctx.fillStyle = grad;
        ctx.fillRect(playhead - visualWidth/2, centerY - bufferHeight, visualWidth, bufferHeight * 2);

        // 3. Etiqueta
        ctx.fillStyle = index % 2 === 0 ? '#00ff88' : '#0088ff';
        ctx.font = '9px Courier New';
        ctx.fillText(`${id.toUpperCase()} | RATE:${params.rate} | SIZE:${grainSizeMs}ms`, playhead - visualWidth/2, centerY - bufferHeight - 5);
    });

    requestAnimationFrame(draw);
}

// Llançar l'animació
draw();

</script>
