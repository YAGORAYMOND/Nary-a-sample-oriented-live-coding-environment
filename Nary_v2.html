<!-- 
  Aquest és el fitxer N-ARY. 
  Un fitxer .html és com una ceba amb vàries capes:
  1. Estructura (HTML): On van els botons i textos.
  2. Estètica (CSS): On definim colors i mides.
  3. Lògica (JavaScript): On passa la màgia de l'àudio i el dibuix.
-->


<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>N-ary | Texture Engine</title>
    
    <!-- CSS: Aquí definim com es veu la interfície -->
    <style>
        /* Posem el fons negre i la lletra verda "matrix" */
        body { 
            background: #020202; 
            color: #00ff88; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; /* Que ocupi tota la pantalla */
        }
        
        /* L'editor on escrius el codi */
        #editor { 
            flex: 1; /* Que s'estiri tot el que pugui */
            background: transparent; 
            color: #00ff88; 
            border: none; 
            padding: 25px; 
            font-size: 16px; 
            outline: none; 
            resize: none;
            line-height: 1.2; 
        }
        
        /* El rectangle de sota on es veuen les ones */
        #viz { 
            height: 20%; 
            background: #000; 
            border-top: 1px solid #111; 
        }
        
    </style>
</head>
<body>



<!-- On escrius les teves instruccions N-ary -->
<textarea id="editor" spellcheck="false">
//Press CTRL+ENTER to run and CTRL+"." to stop

nuvol > source triangle
  rate 15
  jitter 0.05    // 50ms de variació aleatòria
  density 80
  grain 1200ms
  pitch 0
  fine_detune 8 drift 5s
  reverb 0.9
  focus micro

guspires > source sine
  rate 2
  activity 0.4
  pitch 24
  grain 50ms
  reverb 0.2
  focus macro
</textarea>

<!-- El "llenç" on es dibuixen les ones -->
<canvas id="viz"></canvas>

<!-- JAVASCRIPT: El cervell que processa l'àudio i els visuals -->
<script>
// Variables globals: Són com calaixos on guardem les coses importants per a tot el programa
let audioCtx, masterGain, verb;
let runningFluxes = {}; // Aquí guardem cada "nuvol" o "guspires" que està sonant

/**
 * Funció principal que engega el sistema d'àudio
 */
async function initNary() {
    // Si el sistema d'àudio no existeix, el creem (només passa un cop)
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // El control de volum principal
        masterGain = audioCtx.createGain();
        masterGain.gain.value = 0.3;

        // --- CREACIÓ DE LA REVERB ---
        // Creem un "impuls" de soroll que simula una catedral o espai buit
        verb = audioCtx.createConvolver();
        const length = audioCtx.sampleRate * 4;
        const impulse = audioCtx.createBuffer(2, length, audioCtx.sampleRate);
        for (let i = 0; i < 2; i++) {
            const chan = impulse.getChannelData(i);
            for (let j = 0; j < length; j++) {
                // Matemàtiques per fer que el soroll s'esvaeixi suaument
                chan[j] = (Math.random() * 2 - 1) * Math.pow(1 - j / length, 3);
            }
        }
        verb.buffer = impulse;
        
        // Connectem els cables virtuals: So -> Reverb -> Sortida
        masterGain.connect(verb);
        verb.connect(audioCtx.destination);
        masterGain.connect(audioCtx.destination); // També so directe sense reverb
    }
    
    // Si l'àudio estava "adormit" (pel navegador), el despertem
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    
    // Cridem a la funció que llegeix el text de l'editor
    updateEngine();
}

/**
 * El PARSER: Llegeix el teu text i el tradueix a dades que l'ordinador entén
 */
function updateEngine() {
    const lines = document.getElementById('editor').value.split('\n');
    let currentId = null; 
    let newSettings = {}; 

    lines.forEach(line => {
        const trimmed = line.trim();
        if (!trimmed || trimmed.startsWith('//')) return;

        // Si troba '>', sap que comença un so nou
        if (line.includes('>')) {
            currentId = line.split('>')[0].trim();
            newSettings[currentId] = { params: {} };
        } 
        // Si la línia està indentada, guarda els paràmetres (rate, pitch, etc.)
        else if (currentId && (line.startsWith(' ') || line.startsWith('\t'))) {
            const parts = trimmed.split(/\s+/);
            const attr = parts[0]; 
            const val = parts[1];  
            
            if (attr && val) {
                newSettings[currentId].params[attr] = val;
            }
        }
    });

    // Per cada so que hem llegit, o el creem o l'actualitzem
    Object.keys(newSettings).forEach(id => {
        if (!runningFluxes[id]) {
            runningFluxes[id] = createFluxInstance(id, newSettings[id]);
        } else {
            runningFluxes[id].update(newSettings[id].params);
        }
    });
}

/**
 * LA FÀBRICA DE SO: Crea la vida de cada flux (nuvol, guspires, etc.)
 */
function createFluxInstance(id, data) {
    let params = data.params;
    let intervalId = null;

    // Aquesta funció es dispara molts cops per segon per crear els "grans" de so
    const tick = () => {
        // JITTER: Retard aleatori perquè no soni com una màquina rígida
        const jitterAmount = parseFloat(params.jitter) || 0;
        const randomDelay = Math.random() * jitterAmount * 1000; 

        setTimeout(() => {
            // ACTIVITY: Probabilitat de que el gra soni o es quedi en silenci
            if (params.activity && Math.random() > parseFloat(params.activity)) return;

            const now = audioCtx.currentTime;
            const dur = params.grain ? parseFloat(params.grain) / 1000 : 0.5;
            
            // CREACIÓ D'HARMÒNICS: Per cada nota, creem 4 sons (fonamental, octava, etc.)
            const harmonics = [1, 2, 3, 1.5];
            harmonics.forEach((h, i) => {
                const osc = audioCtx.createOscillator(); // El generador de l'ona
                const env = audioCtx.createGain();       // El control de volum individual (envolupant)
                const f = audioCtx.createBiquadFilter(); // El filtre per treure aguts (reverb)

                f.type = "lowpass";
                f.frequency.value = (1 - (parseFloat(params.reverb) || 0.5)) * 3000 + 100;

                osc.type = params.source || 'sine';
                
                // Càlcul de la freqüència (pitches i tuning)
                const baseFreq = 110 * Math.pow(2, (parseFloat(params.pitch) || 0) / 12);
                osc.frequency.setValueAtTime(baseFreq * h, now);
                
                // FINE_DETUNE: Desafinem una mica per donar gruix
                osc.detune.setValueAtTime((Math.random() - 0.5) * (parseFloat(params.fine_detune) || 0), now);

                // WINDOWING: Fem que el so pugi i baixi suaument per evitar "clics"
                env.gain.setValueAtTime(0, now);
                env.gain.linearRampToValueAtTime(0.1 / (i + 1), now + dur * 0.4);
                env.gain.exponentialRampToValueAtTime(0.0001, now + dur);

                // Connexió: Oscil·lador -> Filtre -> Volum -> Sortida General
                osc.connect(f); f.connect(env); env.connect(masterGain);
                
                osc.start(now);
                osc.stop(now + dur);
            });

        }, randomDelay); 
    };

    // Iniciem el bucle de repetició segons el 'rate'
    const start = () => {
        if (intervalId) clearInterval(intervalId);
        intervalId = setInterval(tick, 1000 / (parseFloat(params.rate) || 1));
    };

    // Aquesta funció atura el pols rítmic d'aquest so concret
    const stopClock = () => {
        if (intervalId) {
            clearInterval(intervalId); // Destruïm el bucle de repeticions
            intervalId = null;
        }
    };    

    start(); // Engeguem el so al crear-lo
    
    // Fem que la instància es pugui actualitzar o ens doni els seus paràmetres
    return { 
        update: (p) => { params = p; },
        getParams: () => params,
        stop: stopClock
    };
}

/**
 * Atura tots els fluxos de so actius sense tallar la reverb.
 */
function stopNary() {
    // Recorrem tots els IDs (noms) dels sons que estan sonant ara mateix
    Object.keys(runningFluxes).forEach(id => {
        // Cridem al mètode stop() de cada instància (que definirem ara a createFluxInstance)
        runningFluxes[id].stop();
        // L'eliminem de la llista de fluxos actius
        delete runningFluxes[id];
    });
    console.log("Motor N-ary aturat. Esperant cua de reverb...");
}


/**
 * Escolta les tecles per controlar el programa.
 */
document.addEventListener('keydown', e => { 
    // Ctrl + Enter: Executa o actualitza el motor
    if (e.ctrlKey && e.key === 'Enter') {
        initNary(); 
    }
    
    // Ctrl + Punt: El Panic Button
    // Comprovem e.key (el caràcter) o e.keyCode (el codi 190 és el punt)
    if (e.ctrlKey && (e.key === '.' || e.key === 'Period' || e.keyCode === 190)) {
        // Això evita que el navegador intenti fer una cerca o obrir fitxers
        e.preventDefault(); 
        
        console.log("Comandament Ctrl+Punt detectat!"); // Per comprovar que funciona
        stopNary(); 
    }
});


/**
 * EL VISUALITZADOR: Dibuixa el que està passant al Canvas
 */
const canvas = document.getElementById('viz');
const ctx = canvas.getContext('2d');

function draw() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight * 0.25;
    const centerY = canvas.height / 2;
    const bufferHeight = canvas.height * 0.3;

    // Pintem el fons una mica transparent per deixar rastre (estela)
    ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const fluxKeys = Object.keys(runningFluxes);
    
    fluxKeys.forEach((id, index) => {
        const flux = runningFluxes[id];
        const params = flux.getParams(); 
        
        // 1. DIBUIX DE L'ONA DE FONS
        ctx.strokeStyle = index % 2 === 0 ? 'rgba(0, 255, 136, 0.15)' : 'rgba(0, 136, 255, 0.15)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for (let x = 0; x < canvas.width; x++) {
            // Matemàtiques per simular una ona que es mou (drift)
            let drift = Math.sin(Date.now() * 0.001 + index);
            let y = centerY + Math.sin(x * 0.02 + drift) * Math.cos(x * 0.005) * bufferHeight;
            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.stroke();

        // 2. DIBUIX DEL GRA (La finestra que s'encén)
        const grainSizeMs = parseFloat(params.grain) || 100;
        const visualWidth = (grainSizeMs / 1000) * 300; 
        
        let speed = (parseFloat(params.rate) || 1) * 0.001;
        let playhead = (Date.now() * speed * (index + 1)) % canvas.width;

        // Gradient perquè el gra sigui difuminat pels costats
        const grad = ctx.createLinearGradient(playhead - visualWidth/2, 0, playhead + visualWidth/2, 0);
        grad.addColorStop(0, 'rgba(0, 255, 136, 0)');
        grad.addColorStop(0.5, index % 2 === 0 ? 'rgba(0, 255, 136, 0.4)' : 'rgba(0, 136, 255, 0.4)');
        grad.addColorStop(1, 'rgba(0, 255, 136, 0)');
        
        ctx.fillStyle = grad;
        ctx.fillRect(playhead - visualWidth/2, centerY - bufferHeight, visualWidth, bufferHeight * 2);

        // 3. TEXT INFORMATIU
        ctx.fillStyle = index % 2 === 0 ? '#00ff88' : '#0088ff';
        ctx.font = '9px Courier New';
        ctx.fillText(`${id.toUpperCase()} | RATE:${params.rate} | SIZE:${grainSizeMs}ms`, playhead - visualWidth/2, centerY - bufferHeight - 5);
    });

    // Crida a la següent imatge de l'animació
    requestAnimationFrame(draw);
}

// Engeguem el dibuix
draw();

</script>
</body>
</html>
