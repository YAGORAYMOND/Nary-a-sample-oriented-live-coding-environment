<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nary: a sample-oriented live coding environment</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/theme/monokai.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.2/mode/javascript/javascript.min.js"></script>
    <style>
        body { margin: 0; background: #1a1a1a; color: white; font-family: monospace; }
        #drop-zone { height: 60px; border: 2px dashed #4CAF50; margin: 10px; display: flex; align-items: center; justify-content: center; background: #252525; border-radius: 8px; }
        .CodeMirror { height: 400px; font-size: 18px; border-bottom: 1px solid #444; }
        #controls { padding: 15px; background: #333; display: flex; gap: 10px; }
        button { cursor: pointer; padding: 10px 20px; background: #4CAF50; border: none; color: white; border-radius: 4px; font-weight: bold; }
        #log { padding: 10px; color: #4CAF50; font-size: 12px; }
    </style>
</head>
<body>

<div id="drop-zone">DROP .WAV HERE</div>
<div id="log">Waiting for file...</div>

<textarea id="code-editor">
// Nary Syntax: sample >> rhythm
"current" >> "8n"
</textarea>

<div id="controls">
    <button onclick="execute()">EXECUTE (Ctrl+Enter)</button>
    <button onclick="stop()" style="background:#f44336;">STOP (Ctrl+.)</button>
</div>

<script>
    // 1. GLOBAL VARIABLES
    window.currentSample = null;
    const logElement = document.getElementById('log');

    // 2. THE NARY ENGINE
    const nary = {
        createLoop: (rhythm) => {
            if (!window.currentSample) {
                logElement.innerText = "Error: No sample loaded";
                return;
            }
            // Reset volume
            Tone.getDestination().volume.rampTo(0, 0.1);
            
            const player = new Tone.Player(window.currentSample).toDestination();
            new Tone.Loop(time => {
                player.start(time);
            }, rhythm).start(0);
            
            Tone.Transport.start();
        }
    };

    // 3. EDITOR INITIALIZATION
    const editor = CodeMirror.fromTextArea(document.getElementById("code-editor"), {
        lineNumbers: true, 
        mode: "javascript", 
        theme: "monokai"
    });

    // 4. TRANSLATOR FUNCTION
    function translate(code) {
        // Transforms "anything" >> "anything" into nary.createLoop("anything")
        return code.replace(/".+?"\s*>>\s*(".+?")/g, (match, rhythm) => {
            return `nary.createLoop(${rhythm});`;
        });
    }

    // 5. DRAG & DROP LOGIC
    const dropZone = document.getElementById('drop-zone');
    dropZone.ondragover = e => e.preventDefault();
    dropZone.ondrop = e => {
        e.preventDefault();
        const file = e.dataTransfer.files[0];
        if (file) {
            window.currentSample = URL.createObjectURL(file);
            logElement.innerText = "Loaded: " + file.name;
        }
    };

    // 6. EXECUTION LOGIC
    async function execute() {
        await Tone.start();
        Tone.Transport.cancel(0);
        
        try {
            const rawCode = editor.getValue();
            const translatedCode = translate(rawCode);
            
            // Helpful for debugging your new language
            console.log("Nary Translation:", translatedCode);
            
            const log = (msg) => { logElement.innerText = msg; };
            const script = new Function('Tone', 'nary', 'log', translatedCode);
            script(Tone, nary, log);
        } catch (err) {
            console.error("Syntax Error:", err);
            logElement.innerText = "Error: " + err.message;
        }
    }

    // 7. STOP LOGIC
    function stop() {
        Tone.Transport.stop();
        Tone.Transport.cancel(0);
        Tone.getDestination().volume.rampTo(-Infinity, 0.1);
        logElement.innerText = "AUDIO STOPPED";
    }

    // 8. SHORTCUTS
    editor.setOption("extraKeys", {
        "Ctrl-Enter": execute,
        "Cmd-Enter": execute,
        "Ctrl-.": stop
    }); 
</script>
</body>
</html>
